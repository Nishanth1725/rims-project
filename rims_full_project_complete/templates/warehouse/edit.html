{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h3 class="mb-4">Edit Warehouse</h3>
    
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      
      <div class="mb-3">
        <label for="warehouse_name" class="form-label">Warehouse Name <span class="text-danger">*</span></label>
        <input type="text" 
               class="form-control" 
               id="warehouse_name" 
               name="warehouse_name" 
               required 
               maxlength="200"
               value="{{ warehouse.warehouse_name }}"
               placeholder="Enter warehouse name">
      </div>
      
      <div class="mb-3">
        <label for="capacity" class="form-label">Capacity</label>
        <input type="number" 
               class="form-control" 
               id="capacity" 
               name="capacity" 
               min="0"
               value="{{ warehouse.capacity if warehouse.capacity else '' }}"
               placeholder="Enter capacity (optional)">
        <small class="form-text text-muted">Maximum storage capacity (optional)</small>
      </div>
      
      <div class="mb-3 form-check">
        <input type="checkbox" 
               class="form-check-input" 
               id="is_refrigerated" 
               name="is_refrigerated" 
               value="1"
               {% if warehouse.is_refrigerated %}checked{% endif %}>
        <label class="form-check-label" for="is_refrigerated">
          Is Refrigerated
        </label>
        <small class="form-text text-muted d-block">Check if this warehouse requires refrigeration</small>
      </div>
      
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Update Warehouse</button>
        <a href="{{ url_for('warehouse.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
